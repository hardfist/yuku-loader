name: Benchmark

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  remove-console:
    name: remove-console
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Benchmark remove-console
        run: npm run benchmark:remove-console
